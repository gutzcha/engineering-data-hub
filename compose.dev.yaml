# ===
# File Summary
# Path: compose.dev.yaml
# Type: shell
# Purpose: Compose environment definition for local and service-stack execution.
# Primary responsibilities:
# - Domain behavior is summarized for fast onboarding and avoids full-file reread.
# - Core symbols: file-level implementation
# Inputs:
# - Downstream and upstream interactions in the same domain.
# Outputs:
# - API payloads, records, side effects, or UI views depending on file role.
# Dependencies:
# - Shared runtime services and adjacent domain modules.
# Known risks:
# - Validate behavior after migrations, dependency upgrades, or contract changes.
# ===
# 

services:
  proxy:
    ports:
      - "443:443"
    environment:
      CADDY_TLS_DIRECTIVE: tls internal

  backend:
    environment:
      DJANGO_SETTINGS_MODULE: plastic_hub.settings.dev
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - managed_files:/data/managed
      - media_files:/data/media
      - backup_files:/data/backups

  worker:
    environment:
      DJANGO_SETTINGS_MODULE: plastic_hub.settings.dev
    volumes:
      - ./backend:/app
      - managed_files:/data/managed
      - media_files:/data/media
      - backup_files:/data/backups

  beat:
    environment:
      DJANGO_SETTINGS_MODULE: plastic_hub.settings.dev
    volumes:
      - ./backend:/app
      - managed_files:/data/managed
      - media_files:/data/media
      - backup_files:/data/backups

  meilisearch:
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development

  frontend:
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

