x-env-files: &env_files
  - path: .env.example
  - path: .env
    required: false

services:
  proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file: *env_files
    ports:
      - "443:443"
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./ops/caddy/certs:/etc/caddy/certs:ro
      - media_files:/data/media:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: *env_files
    environment:
      DJANGO_SETTINGS_MODULE: plastic_hub.settings.prod
    command: gunicorn plastic_hub.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - managed_files:/data/managed
      - media_files:/data/media
      - backup_files:/data/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: *env_files
    environment:
      DJANGO_SETTINGS_MODULE: plastic_hub.settings.prod
    command: celery -A plastic_hub worker -l info
    volumes:
      - managed_files:/data/managed
      - media_files:/data/media
      - backup_files:/data/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: *env_files
    environment:
      DJANGO_SETTINGS_MODULE: plastic_hub.settings.prod
    command: celery -A plastic_hub beat -l info
    volumes:
      - managed_files:/data/managed
      - media_files:/data/media
      - backup_files:/data/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: *env_files
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backup_files:/data/backups:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    env_file: *env_files
    environment:
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file: *env_files
    command: npm run start
    depends_on:
      - backend

volumes:
  postgres_data:
  meili_data:
  managed_files:
  media_files:
  backup_files:
